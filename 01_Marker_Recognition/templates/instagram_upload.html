<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marker Detection → Instagram</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(90deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 36px;
      text-align: center;
    }

    /* ── Upload zone ── */
    .upload-zone {
      width: 100%;
      max-width: 520px;
      border: 2px dashed #333;
      border-radius: 14px;
      padding: 44px 20px;
      text-align: center;
      cursor: pointer;
      background: #161616;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: #e1306c;
      background: #1a0e14;
    }
    .upload-zone .icon { font-size: 2.8rem; margin-bottom: 10px; }
    .upload-zone strong { font-size: 1rem; }
    .upload-zone p { color: #555; font-size: 0.85rem; margin-top: 6px; }

    /* ── Preview image (before processing) ── */
    .preview-wrap {
      width: 100%;
      max-width: 520px;
      margin-top: 20px;
      display: none;
    }
    .preview-wrap img {
      width: 100%;
      border-radius: 10px;
      display: block;
    }
    .preview-wrap .label {
      font-size: 0.75rem;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Caption & button ── */
    .form-group {
      width: 100%;
      max-width: 520px;
      margin-top: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: #666;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group textarea:focus { border-color: #e1306c; }

    .post-btn {
      width: 100%;
      max-width: 520px;
      margin-top: 14px;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.1s;
    }
    .post-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .post-btn:not(:disabled):hover { opacity: 0.88; }
    .post-btn:not(:disabled):active { transform: scale(0.98); }

    /* ── Spinner ── */
    .spinner {
      display: none;
      margin-top: 18px;
      color: #666;
      font-size: 0.88rem;
      text-align: center;
    }
    .spinner.active { display: block; }
    .spin-icon {
      display: inline-block;
      animation: spin 0.9s linear infinite;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result section ── */
    .result-section {
      width: 100%;
      max-width: 520px;
      margin-top: 28px;
      display: none;
    }
    .result-section .label {
      font-size: 0.75rem;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .result-section img {
      width: 100%;
      border-radius: 10px;
      display: block;
    }

    .success-banner {
      margin-top: 12px;
      padding: 12px 16px;
      background: #0b1f14;
      border: 1px solid #1e5c38;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #6fcf97;
      word-break: break-all;
    }
    .success-banner a { color: #6fcf97; }
    .success-banner a:hover { text-decoration: underline; }

    .error-banner {
      margin-top: 12px;
      padding: 12px 16px;
      background: #1f0b0b;
      border: 1px solid #5c1e1e;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #f08080;
    }
  </style>
</head>
<body>

  <h1>Marker Detection → Instagram</h1>
  <p class="subtitle">Upload a photo · detect markers · post the annotated result to Instagram</p>

  <!-- Upload zone -->
  <div class="upload-zone" id="dropZone">
    <div class="icon">📷</div>
    <strong>Click to upload or drag &amp; drop</strong>
    <p>JPEG or PNG · up to 20 MB</p>
    <input type="file" id="fileInput" accept="image/jpeg,image/png" hidden>
  </div>

  <!-- Original image preview -->
  <div class="preview-wrap" id="previewWrap">
    <div class="label">Original</div>
    <img id="previewImg" alt="Original image">
  </div>

  <!-- Caption -->
  <div class="form-group">
    <label for="captionInput">Instagram caption</label>
    <textarea id="captionInput" placeholder="Write a caption… (optional)"></textarea>
  </div>

  <button class="post-btn" id="postBtn" disabled>Detect &amp; Post to Instagram</button>

  <div class="spinner" id="spinner">
    <span class="spin-icon">⏳</span>Processing and uploading…
  </div>

  <!-- Result -->
  <div class="result-section" id="resultSection">
    <div class="label">Annotated result</div>
    <img id="resultImg" alt="Processed result">
    <div id="statusBanner"></div>
  </div>

  <script>
    const dropZone    = document.getElementById('dropZone');
    const fileInput   = document.getElementById('fileInput');
    const previewWrap = document.getElementById('previewWrap');
    const previewImg  = document.getElementById('previewImg');
    const captionInput= document.getElementById('captionInput');
    const postBtn     = document.getElementById('postBtn');
    const spinner     = document.getElementById('spinner');
    const resultSection = document.getElementById('resultSection');
    const resultImg   = document.getElementById('resultImg');
    const statusBanner= document.getElementById('statusBanner');

    let selectedFile = null;

    // ── File selection ──────────────────────────────────────────────────────
    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const f = e.dataTransfer.files[0];
      if (f) setFile(f);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    function setFile(file) {
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        previewImg.src = e.target.result;
        previewWrap.style.display = 'block';
      };
      reader.readAsDataURL(file);
      postBtn.disabled = false;
      resultSection.style.display = 'none';
      statusBanner.innerHTML = '';
    }

    // ── Upload & process ────────────────────────────────────────────────────
    postBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      postBtn.disabled = true;
      spinner.classList.add('active');
      resultSection.style.display = 'none';
      statusBanner.innerHTML = '';

      const formData = new FormData();
      formData.append('image', selectedFile);
      formData.append('caption', captionInput.value);

      try {
        const res  = await fetch('/process', { method: 'POST', body: formData });
        const data = await res.json();

        resultImg.src = data.preview;
        resultSection.style.display = 'block';

        if (data.ig_url) {
          statusBanner.innerHTML =
            `<div class="success-banner">
               ✅ Posted to Instagram:<br>
               <a href="${data.ig_url}" target="_blank">${data.ig_url}</a>
             </div>`;
        } else if (data.error) {
          statusBanner.innerHTML =
            `<div class="error-banner">⚠️ ${data.error}</div>`;
        }

      } catch (err) {
        statusBanner.innerHTML =
          `<div class="error-banner">⚠️ Request failed: ${err.message}</div>`;
        resultSection.style.display = 'block';

      } finally {
        spinner.classList.remove('active');
        postBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
