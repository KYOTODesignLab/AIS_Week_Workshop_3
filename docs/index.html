<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIS Capture</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      box-shadow: inset 0 0 0 2px #fff;
    }

    #msg-bar {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.85);
      pointer-events: none;
      white-space: nowrap;
      z-index: 20;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #msg-bar.visible { opacity: 1; }

    #preview, #snapshot {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    #snapshot { display: none; }
    canvas    { display: none; }

    .fab {
      position: fixed;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      transition: transform 0.1s;
      z-index: 10;
    }
    .fab:active { transform: scale(0.90); }

    #capture-btn {
      background: #e53e3e;
      bottom: 50px;
      right: 50px;
    }

    #send-btn {
      background: #3182ce;
      bottom: 50px;
      left: 50px;
      display: none;
    }
  </style>
</head>
<body>

  <div id="msg-bar"></div>
  <video id="preview" autoplay playsinline muted></video>
  <img   id="snapshot" alt="" />
  <canvas id="canvas"></canvas>

  <button id="capture-btn" class="fab"></button>
  <button id="send-btn"    class="fab"></button>

  <script>
    const preview    = document.getElementById('preview');
    const snapshot   = document.getElementById('snapshot');
    const canvas     = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture-btn');
    const sendBtn    = document.getElementById('send-btn');

    const sessionId  = Math.random().toString(36).slice(2) + Date.now().toString(36);
    let mqttClient   = null;
    let mqttReady    = false;
    let stream       = null;
    let capturedBlob = null;
    let inStill      = false;
    const msgBar     = document.getElementById('msg-bar');
    let msgTimer     = null;

    function showMessage(text) {
      clearTimeout(msgTimer);
      msgBar.textContent = text;
      msgBar.classList.add('visible');
      msgTimer = setTimeout(() => msgBar.classList.remove('visible'), 3000);
    }

    // ── Camera ────────────────────────────────────────────────────────────────

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 4096 }, height: { ideal: 2160 }, facingMode: { ideal: 'environment' } },
          audio: false
        });
        preview.srcObject = stream;
      } catch (err) {
        console.error('Camera error:', err);
      }
    }

    // ── Capture / Retake ──────────────────────────────────────────────────────

    captureBtn.addEventListener('click', () => {
      if (inStill) {
        // Dump still → back to video
        if (snapshot.src) URL.revokeObjectURL(snapshot.src);
        capturedBlob           = null;
        snapshot.src           = '';
        snapshot.style.display = 'none';
        preview.style.display  = '';
        sendBtn.style.display  = 'none';
        inStill = false;
      } else {
        // Take stillshot
        const track    = stream?.getVideoTracks()[0];
        const settings = track?.getSettings() ?? {};
        const w = settings.width  || preview.videoWidth;
        const h = settings.height || preview.videoHeight;
        canvas.width  = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(preview, 0, 0, w, h);
        canvas.toBlob(blob => {
          capturedBlob           = blob;
          snapshot.src           = URL.createObjectURL(blob);
          snapshot.style.display = 'block';
          preview.style.display  = 'none';
          sendBtn.style.display  = 'block';
          inStill = true;
        }, 'image/jpeg', 0.95);
      }
    });

    // ── Send via MQTT ─────────────────────────────────────────────────────────

    sendBtn.addEventListener('click', () => {
      if (!capturedBlob || !mqttReady) return;
      const reader = new FileReader();
      reader.onload = () => {
        mqttClient.publish(
          `ais-workshop/image/${sessionId}`,
          JSON.stringify({ session_id: sessionId, image: reader.result.split(',')[1], message: '' })
        );
        // Return to video
        if (snapshot.src) URL.revokeObjectURL(snapshot.src);
        capturedBlob           = null;
        snapshot.src           = '';
        snapshot.style.display = 'none';
        preview.style.display  = '';
        sendBtn.style.display  = 'none';
        inStill = false;
      };
      reader.readAsDataURL(capturedBlob);
    });

    // ── MQTT ──────────────────────────────────────────────────────────────────

    function connectMQTT() {
      mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
        clientId:        `ais-web-${sessionId}`,
        clean:           true,
        reconnectPeriod: 3000,
      });
      mqttClient.on('connect', () => {
        mqttReady = true;
        mqttClient.subscribe(`ais-workshop/result/${sessionId}`);
      });
      mqttClient.on('error',     () => { mqttReady = false; });
      mqttClient.on('reconnect', () => { mqttReady = false; });
      mqttClient.on('message', (_topic, payload) => {
        try {
          const data = JSON.parse(payload.toString());
          if (data.status) showMessage(data.status);
        } catch {}
      });
    }

    startCamera();
    connectMQTT();
  </script>
</body>
</html>
