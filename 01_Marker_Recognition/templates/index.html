<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YOLO Marker Detection</title>
  <link rel="stylesheet" href="/css/index.css" />
</head>
<body>

  <!-- QR code / waiting screen -->
  <div id="qr-screen">
    <span class="badge">Marker Detection · Live</span>
    <h1>YOLO Marker Detection</h1>
    <img id="qr-img" src="{{ qr_data }}" alt="QR Code" />
    <p>Scan with your phone to start the camera stream</p>
    <span class="url">{{ camera_url }}</span>
  </div>

  <!-- Processed video screen -->
  <div id="video-screen">
    <img id="processed-frame" src="" alt="Live stream" />
    <div id="status-bar">
      <div id="status-dot"></div>
      <span id="status-text">Streaming</span>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const qrScreen    = document.getElementById('qr-screen');
    const videoScreen = document.getElementById('video-screen');
    const frameImg    = document.getElementById('processed-frame');
    const statusText  = document.getElementById('status-text');

    const socket = io({ transports: ['websocket'] });

    socket.on('connect', () => {
      console.log('Connected to server');
    });

    socket.on('processed_frame', (dataUri) => {
      frameImg.src = dataUri;
      qrScreen.style.display    = 'none';
      videoScreen.style.display = 'block';
    });

    socket.on('stream_status', (data) => {
      if (!data.active) {
        // No camera connected — show QR again
        videoScreen.style.display = 'none';
        qrScreen.style.display    = 'flex';
      }
    });

    socket.on('disconnect', () => {
      statusText.textContent = 'Reconnecting…';
    });
  </script>
</body>
</html>
