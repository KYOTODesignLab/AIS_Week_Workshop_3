<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Camera Stream</title>
  <meta name="theme-color" content="#0d0d0d" />
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #0d0d0d;
      color: #e8e8e8;
    }
  </style>
  <link rel="stylesheet" href="/css/camera.css" />
</head>
<body>

  <div id="ssl-banner">
    ⚠ If you see a "not secure" warning, tap <strong>Advanced → Proceed</strong>
    to allow camera access over this local connection.
  </div>

  <div id="preview-wrap">
    <video id="preview" autoplay playsinline muted></video>
    <canvas id="send-canvas"></canvas>
    <button id="lens-btn" title="Switch lens">⊙</button>

    <div id="overlay">
      <h2 id="overlay-title">Starting camera…</h2>
      <p id="overlay-sub">Please allow camera access when prompted.</p>
    </div>
  </div>

  <div id="status-bar">
    <div id="status-dot" class="connecting"></div>
    <span id="status-label">Initializing…</span>
    <span id="fps-label"></span>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    // ── Config ────────────────────────────────────────────────────
    const SEND_EVERY_MS = 50;    // send up to 20 fps; server worker throttles naturally
    const SEND_WIDTH    = 640;   // downscale before sending to reduce network + decode cost

    // ── State ─────────────────────────────────────────────────────
    let streaming        = false;
    let lastSendTs       = 0;
    let framesSent       = 0;
    let videoDevices     = [];
    let currentDeviceIdx = 0;
    let fpsTimerStarted  = false;
    let loopStarted      = false;

    // ── Elements ──────────────────────────────────────────────────
    const video       = document.getElementById('preview');
    const sendCanvas  = document.getElementById('send-canvas');
    const overlayEl   = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlaySub  = document.getElementById('overlay-sub');
    const dot         = document.getElementById('status-dot');
    const statusLabel = document.getElementById('status-label');
    const fpsLabel    = document.getElementById('fps-label');
    const sslBanner   = document.getElementById('ssl-banner');
    const lensBtn     = document.getElementById('lens-btn');

    // ── Socket.IO ─────────────────────────────────────────────────
    const socket = io({ transports: ['websocket'] });
    socket.on('disconnect', () => { if (streaming) setStatus('error', 'Socket disconnected…'); });

    // ── Helpers ───────────────────────────────────────────────────
    function setStatus(cls, text) {
      dot.className = cls;
      statusLabel.textContent = text;
    }

    // ── Camera ────────────────────────────────────────────────────
    async function startCamera(deviceId = null) {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error(
            'Camera API unavailable. This page must be opened over HTTPS.\n' +
            'Accept the SSL certificate warning first (tap Advanced → Proceed), then reload.'
          );
        }
        const videoConstraints = deviceId
          ? { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } }
          : { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } };
        const stream = await navigator.mediaDevices.getUserMedia({ video: videoConstraints, audio: false });
        video.srcObject = stream;
        await new Promise(res => { video.onloadedmetadata = res; });
        overlayEl.classList.add('hidden');
        if (location.protocol === 'https:') sslBanner.style.display = 'none';
        streaming = true;
        setStatus('streaming', 'Streaming to server…');

        // Enumerate cameras once after permission is granted
        if (videoDevices.length === 0) {
          const allDevices = await navigator.mediaDevices.enumerateDevices();
          videoDevices = allDevices.filter(d => d.kind === 'videoinput');
          const activeId = stream.getVideoTracks()[0]?.getSettings()?.deviceId;
          currentDeviceIdx = videoDevices.findIndex(d => d.deviceId === activeId);
          if (currentDeviceIdx === -1) currentDeviceIdx = 0;
          if (videoDevices.length > 1) lensBtn.style.display = 'flex';
        }

        if (!fpsTimerStarted) {
          fpsTimerStarted = true;
          setInterval(() => {
            if (streaming) { fpsLabel.textContent = `${framesSent} fps`; framesSent = 0; }
          }, 1000);
        }

        if (!loopStarted) {
          loopStarted = true;
          requestAnimationFrame(sendLoop);
        }
      } catch (err) {
        overlayTitle.textContent = 'Camera access denied';
        overlaySub.textContent   = err.message;
        setStatus('error', 'Camera error: ' + err.name);
      }
    }

    // ── Lens switching ────────────────────────────────────────────
    async function switchLens() {
      if (videoDevices.length < 2) return;
      currentDeviceIdx = (currentDeviceIdx + 1) % videoDevices.length;
      streaming = false;
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(t => t.stop());
        video.srcObject = null;
      }
      await startCamera(videoDevices[currentDeviceIdx].deviceId);
    }

    lensBtn.addEventListener('click', switchLens);

    // ── Send raw frame to server (PC runs YOLO) ───────────────────
    function sendLoop() {
      const now = Date.now();
      if (
        streaming && socket.connected &&
        now - lastSendTs >= SEND_EVERY_MS &&
        video.readyState >= 2 && video.videoWidth > 0
      ) {
        lastSendTs = now;
        const vw = video.videoWidth, vh = video.videoHeight;
        // Downscale to SEND_WIDTH to reduce network + server decode cost
        const scale = Math.min(1.0, SEND_WIDTH / vw);
        const sw = Math.round(vw * scale), sh = Math.round(vh * scale);
        sendCanvas.width = sw; sendCanvas.height = sh;
        sendCanvas.getContext('2d').drawImage(video, 0, 0, sw, sh);
        socket.emit('frame', sendCanvas.toDataURL('image/jpeg', 0.70));
        framesSent++;
      }
      requestAnimationFrame(sendLoop);
    }

    // ── Boot ──────────────────────────────────────────────────────
    if (location.protocol === 'https:') sslBanner.style.display = 'block';
    lensBtn.style.display = 'none';
    startCamera();
  </script>
</body>
</html>
