<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=overlays-content" />
  <title>AIS Capture</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* CSS fallback: counter-rotate everything when in landscape */
    @media (orientation: landscape) {
      body {
        transform-origin: top left;
        transform: rotate(90deg) translateY(-100%);
        width: 100vh;
        height: 100vw;
      }
    }

    #border-frame {
      position: fixed;
      inset: 0;
      border: 2px solid #fff;
      pointer-events: none;
      z-index: 30;
    }

    #title-bar {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: 1.15rem;
      letter-spacing: 0.10em;
      color: rgba(255,255,255,0.9);
      pointer-events: none;
      white-space: nowrap;
      z-index: 40;
    }

    #msg-bar {
      position: fixed;
      top: 52px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.75);
      pointer-events: none;
      white-space: nowrap;
      z-index: 40;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #msg-bar.visible { opacity: 1; }

    #console-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 4px 10px;
      background: rgba(0,0,0,0.55);
      font-family: 'Roboto Mono', 'Courier New', monospace;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
      z-index: 50;
    }

    #preview, #snapshot {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    #snapshot { display: none; }
    canvas    { display: none; }

    .fab {
      position: fixed;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      transition: transform 0.1s;
      z-index: 10;
    }
    #crop-guide {
      position: fixed;
      border: 1px solid rgba(255,255,255,0.5);
      pointer-events: none;
      z-index: 5;
      /* dims the areas outside the crop zone */
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.35);
    }

    .fab:active { transform: scale(0.90); }

    #capture-btn {
      background: #e53e3e;
      bottom: 50px;
      right: 50px;
    }

    #nickname-input {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.85);
      font-family: 'Roboto', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-align: center;
      width: 200px;
      outline: none;
      z-index: 40;
      padding-bottom: 2px;
    }
    #nickname-input::placeholder {
      color: rgba(255,255,255,0.35);
    }
    #send-btn {
      background: #3182ce;
      bottom: 50px;
      left: 50px;
      display: none;
    }
  </style>
</head>
<body>

  <div id="border-frame"></div>
  <div id="crop-guide"></div>
  <div id="title-bar">Mikoshi Visualizer</div>
  <div id="msg-bar"></div>
  <div id="console-bar">ready</div>
  <input id="nickname-input" type="text" placeholder="[ input your nickname ]" autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="done" />
  <video id="preview" autoplay playsinline muted></video>
  <img   id="snapshot" alt="" />
  <canvas id="canvas"></canvas>

  <button id="capture-btn" class="fab"></button>
  <button id="send-btn"    class="fab"></button>

  <script>
    const preview    = document.getElementById('preview');
    const snapshot   = document.getElementById('snapshot');
    const canvas     = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture-btn');
    const sendBtn    = document.getElementById('send-btn');
    const cropGuide  = document.getElementById('crop-guide');

    function sizeCropGuide() {
      const side = Math.min(window.innerWidth, window.innerHeight);
      cropGuide.style.width  = side + 'px';
      cropGuide.style.height = side + 'px';
      cropGuide.style.left   = ((window.innerWidth  - side) / 2) + 'px';
      cropGuide.style.top    = ((window.innerHeight - side) / 2) + 'px';
    }
    sizeCropGuide();
    window.addEventListener('resize', sizeCropGuide);

    const sessionId     = Math.random().toString(36).slice(2) + Date.now().toString(36);
    let mqttClient      = null;
    let mqttReady       = false;
    let stream          = null;
    let capturedBlob    = null;
    let inStill         = false;
    const msgBar        = document.getElementById('msg-bar');
    const nicknameInput = document.getElementById('nickname-input');
    let msgTimer        = null;
    let msgQueue        = [];
    let msgBusy         = false;

    // Dismiss virtual keyboard on Enter or when focus leaves the nickname field
    nicknameInput.addEventListener('keydown', e => { if (e.key === 'Enter') nicknameInput.blur(); });

    // ── Sensor state ─────────────────────────────────────────────────────────
    let geoLocation  = null;
    let deviceOrient = null;

    // Geolocation — request once, keep updating
    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(
        pos => {
          geoLocation = {
            latitude:  pos.coords.latitude,
            longitude: pos.coords.longitude,
            accuracy:  pos.coords.accuracy
          };
        },
        () => {},
        { enableHighAccuracy: true }
      );
    }

    // Device orientation (pitch / yaw)
    function _startOrientation() {
      window.addEventListener('deviceorientation', e => {
        deviceOrient = {
          alpha: e.alpha != null ? +e.alpha.toFixed(2) : null,  // yaw (compass)
          beta:  e.beta  != null ? +e.beta.toFixed(2)  : null,  // pitch
          gamma: e.gamma != null ? +e.gamma.toFixed(2) : null   // roll
        };
      }, true);
    }
    // iOS 13+ requires a permission request
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      document.addEventListener('click', function _reqOri() {
        DeviceOrientationEvent.requestPermission().then(state => {
          if (state === 'granted') _startOrientation();
        }).catch(() => {});
        document.removeEventListener('click', _reqOri);
      }, { once: true });
    } else {
      _startOrientation();
    }

    // ── On-screen console (bottom bar) ───────────────────────────────────────
    const consoleBar = document.getElementById('console-bar');
    (function() {
      const _log   = console.log.bind(console);
      const _warn  = console.warn.bind(console);
      const _error = console.error.bind(console);
      function _show(args) {
        consoleBar.textContent = args.map(a =>
          typeof a === 'object' ? JSON.stringify(a) : String(a)
        ).join(' ');
      }
      console.log   = function(...args) { _show(args); _log(...args);   };
      console.warn  = function(...args) { _show(args); _warn(...args);  };
      console.error = function(...args) {
        consoleBar.style.color = 'rgba(255,100,100,0.95)';
        _show(args); _error(...args);
        setTimeout(() => { consoleBar.style.color = ''; }, 4000);
      };
    })();

    function showMessage(text) {
      msgQueue.push(text);
      if (!msgBusy) _flushMessage();
    }

    function _flushMessage() {
      if (msgQueue.length === 0) { msgBusy = false; return; }
      msgBusy = true;
      const text = msgQueue.shift();
      msgBar.textContent = text;
      msgBar.classList.add('visible');
      clearTimeout(msgTimer);
      msgTimer = setTimeout(() => {
        msgBar.classList.remove('visible');
        setTimeout(_flushMessage, 300); // wait for fade-out before next
      }, 5000);
    }

    // ── Camera ────────────────────────────────────────────────────────────────

    async function startCamera() {
      showMessage('starting camera…');
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 4096 }, height: { ideal: 2160 }, facingMode: { ideal: 'environment' } },
          audio: false
        });
        preview.srcObject = stream;
        const track = stream.getVideoTracks()[0];
        const s = track?.getSettings() ?? {};
        showMessage(`camera ready  ${s.width ?? '?'}×${s.height ?? '?'}`);
      } catch (err) {
        console.error('Camera error:', err);
        showMessage('camera error — check permissions');
      }
    }

    // ── Capture / Retake ──────────────────────────────────────────────────────

    captureBtn.addEventListener('click', () => {
      if (inStill) {
        // Dump still → back to video
        if (snapshot.src) URL.revokeObjectURL(snapshot.src);
        capturedBlob           = null;
        snapshot.src           = '';
        snapshot.style.display = 'none';
        preview.style.display  = '';
        sendBtn.style.display  = 'none';
        inStill = false;
        showMessage('retake — ready to capture');
      } else {
        // Take stillshot
        showMessage('capturing…');
        const track    = stream?.getVideoTracks()[0];
        const settings = track?.getSettings() ?? {};
        const w = settings.width  || preview.videoWidth;
        const h = settings.height || preview.videoHeight;
        canvas.width  = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(preview, 0, 0, w, h);
        canvas.toBlob(blob => {
          capturedBlob           = blob;
          snapshot.src           = URL.createObjectURL(blob);
          snapshot.style.display = 'block';
          preview.style.display  = 'none';
          sendBtn.style.display  = 'block';
          inStill = true;
          showMessage(`captured  ${w}×${h}  (${Math.round(blob.size/1024)} KB)  — tap send`);
        }, 'image/jpeg', 0.95);
      }
    });

    // ── Send via MQTT (chunked for high-res images) ──────────────────────────

    const CHUNK_SIZE = 180 * 1024;   // 180 KB base64 per chunk → safely under 256 KB MQTT limit

    sendBtn.addEventListener('click', () => {
      if (!mqttReady) { showMessage('not connected — retrying…'); return; }
      if (!capturedBlob) return;
      showMessage('encoding image…');
      const reader = new FileReader();
      reader.onload = () => {
        const b64   = reader.result.split(',')[1];
        const total = Math.ceil(b64.length / CHUNK_SIZE);
        console.log(`Sending image: ~${Math.round(b64.length / 1024)} KB in ${total} chunk(s)`);
        showMessage(`sending ${total} chunk${total > 1 ? 's' : ''}  (~${Math.round(b64.length/1024)} KB)…`);
        const meta = {
          message:     '',
          nickname:    nicknameInput.value.trim() || 'anonymous',
          location:    geoLocation,
          orientation: deviceOrient,
        };
        for (let i = 0; i < total; i++) {
          const chunk = b64.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
          const pkt   = { session_id: sessionId, idx: i, total, chunk };
          if (i === 0) Object.assign(pkt, meta);   // metadata only in first chunk
          mqttClient.publish(`ais-workshop/chunk/${sessionId}`, JSON.stringify(pkt));
        }
        showMessage(`all ${total} chunk${total > 1 ? 's' : ''} sent  — waiting for server…`);
        // Return to video
        if (snapshot.src) URL.revokeObjectURL(snapshot.src);
        capturedBlob           = null;
        snapshot.src           = '';
        snapshot.style.display = 'none';
        preview.style.display  = '';
        sendBtn.style.display  = 'none';
        inStill = false;
      };
      reader.readAsDataURL(capturedBlob);
    });

    // ── MQTT ──────────────────────────────────────────────────────────────────

    function connectMQTT() {
      mqttClient = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
        clientId:        `ais-web-${sessionId}`,
        clean:           true,
        reconnectPeriod: 3000,
      });
      mqttClient.on('connect', () => {
        mqttReady = true;
        mqttClient.subscribe(`ais-workshop/result/${sessionId}`);
        showMessage('connected to server');
      });
      mqttClient.on('error',     (e) => { mqttReady = false; showMessage('connection error — retrying…'); console.error('MQTT error', e); });
      mqttClient.on('reconnect', ()  => { mqttReady = false; showMessage('reconnecting…'); });
      mqttClient.on('close',     ()  => { mqttReady = false; });
      mqttClient.on('message', (_topic, payload) => {
        try {
          const data = JSON.parse(payload.toString());
          if (data.status)     showMessage(data.status);
          if (data.detections) showMessage(`${data.detections.length} detection${data.detections.length !== 1 ? 's' : ''} found`);
          // Always send ack back so server can proceed to next step
          mqttClient.publish(`ais-workshop/ack/${sessionId}`, '1');
        } catch {}
      });
    }

    startCamera();
    connectMQTT();

    // Lock orientation to portrait (supported on Android Chrome / PWA)
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('portrait').catch(() => {});
    }
  </script>
</body>
</html>
