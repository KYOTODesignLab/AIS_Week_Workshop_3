<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Capture</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

  <h1>Photo Capture</h1>

  <div id="viewport">
    <video id="preview" autoplay playsinline muted></video>
    <img  id="snapshot" alt="Captured photo" />
  </div>

  <canvas id="canvas"></canvas>

  <div class="controls">
    <div id="mqtt-status">MQTT: connecting…</div>
    <input id="server-url" type="url" placeholder="Flask server URL (Instagram API posting only)" />
    <div class="row">
      <button id="capture-btn">📷 Capture</button>
      <button id="retake-btn">↩ Retake</button>
    </div>
    <textarea id="message" placeholder="Enter your message…"></textarea>
    <button id="save-btn" disabled>⬆️ Send &amp; Analyse</button>
    <button id="share-btn" disabled>📤 Share to Instagram</button>
    <button id="ig-post-btn" disabled>📸 Post to Instagram</button>
    <div id="status"></div>
  </div>

  <div id="results" hidden>
    <h2>Detections</h2>
    <ul id="detections-list"></ul>
  </div>

  <script>
    const preview       = document.getElementById('preview');
    const snapshot      = document.getElementById('snapshot');
    const canvas        = document.getElementById('canvas');
    const captureBtn    = document.getElementById('capture-btn');
    const retakeBtn     = document.getElementById('retake-btn');
    const saveBtn       = document.getElementById('save-btn');
    const messageEl     = document.getElementById('message');
    const statusEl      = document.getElementById('status');
    const serverUrlEl   = document.getElementById('server-url');
    const resultsEl     = document.getElementById('results');
    const detectionsEl  = document.getElementById('detections-list');
    const shareBtn      = document.getElementById('share-btn');
    const igPostBtn     = document.getElementById('ig-post-btn');
    const mqttStatusEl  = document.getElementById('mqtt-status');

    const sessionId  = Math.random().toString(36).slice(2) + Date.now().toString(36);
    let mqttClient   = null;
    let mqttReady    = false;
    let stream       = null;
    let capturedBlob = null;
    let lastTimestamp = null;

    // ── Camera ────────────────────────────────────────────────────────────────

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            width:     { ideal: 4096 },
            height:    { ideal: 2160 },
            facingMode: { ideal: 'environment' }
          },
          audio: false
        });
        preview.srcObject = stream;
        setStatus('Camera ready.');
      } catch (err) {
        setStatus(`Camera error: ${err.message}`, 'error');
      }
    }

    // ── Capture ───────────────────────────────────────────────────────────────

    captureBtn.addEventListener('click', () => {
      const track    = stream?.getVideoTracks()[0];
      const settings = track?.getSettings() ?? {};
      const w = settings.width  || preview.videoWidth;
      const h = settings.height || preview.videoHeight;

      canvas.width  = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(preview, 0, 0, w, h);

      canvas.toBlob(blob => {
        capturedBlob = blob;
        snapshot.src           = URL.createObjectURL(blob);
        snapshot.style.display = 'block';
        preview.style.display  = 'none';
        captureBtn.style.display = 'none';
        retakeBtn.style.display  = '';
        saveBtn.disabled  = false;
        shareBtn.disabled = false;
        setStatus(`Captured at ${w} × ${h} px.`);
      }, 'image/jpeg', 0.95);
    });

    // ── Retake ────────────────────────────────────────────────────────────────

    retakeBtn.addEventListener('click', () => {
      if (snapshot.src) URL.revokeObjectURL(snapshot.src);
      capturedBlob = null;
      snapshot.src           = '';
      snapshot.style.display = 'none';
      preview.style.display  = 'block';
      captureBtn.style.display = '';
      retakeBtn.style.display  = 'none';
      saveBtn.disabled   = true;
      shareBtn.disabled  = true;
      igPostBtn.disabled = true;
      lastTimestamp      = null;
      setStatus('');
    });

    // ── Send & Analyse ────────────────────────────────────────────────────────

    saveBtn.addEventListener('click', async () => {
      if (!capturedBlob) return;

      const serverUrl = serverUrlEl.value.trim().replace(/\/$/, '');
      if (!serverUrl) {
        setStatus('Please enter the server URL first.', 'error');
        return;
      }

      setStatus('Uploading…');
      saveBtn.disabled = true;

      const form = new FormData();
      form.append('image',   capturedBlob, 'capture.jpg');
      form.append('message', messageEl.value);

      try {
        const res  = await fetch(`${serverUrl}/upload`, { method: 'POST', body: form });
        if (!res.ok) throw new Error(`Server responded ${res.status}`);
        const data = await res.json();

        setStatus(`Done — ${data.detections.length} detection(s).`, 'ok');
        lastTimestamp = data.timestamp;
        igPostBtn.disabled = false;
        showDetections(data.detections);
      } catch (err) {
        setStatus(`Upload error: ${err.message}`, 'error');
      } finally {
        saveBtn.disabled = false;
      }
    });

    function showDetections(detections) {
      detectionsEl.innerHTML = '';
      if (detections.length === 0) {
        detectionsEl.innerHTML = '<li>No detections.</li>';
      } else {
        detections.forEach(d => {
          const li = document.createElement('li');
          li.textContent = `${d.label}  (${(d.confidence * 100).toFixed(1)}%)  `
            + `[${d.box.x1}, ${d.box.y1}, ${d.box.x2}, ${d.box.y2}]`;
          detectionsEl.appendChild(li);
        });
      }
      resultsEl.hidden = false;
    }

    // ── Post to Instagram (via server) ────────────────────────────────────────

    igPostBtn.addEventListener('click', async () => {
      const serverUrl = serverUrlEl.value.trim().replace(/\/$/, '');
      if (!serverUrl || !lastTimestamp) return;
      setStatus('Posting to Instagram…');
      igPostBtn.disabled = true;
      try {
        const res  = await fetch(`${serverUrl}/post-instagram/${lastTimestamp}`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `Server ${res.status}`);
        setStatus(`Posted! Instagram post id: ${data.post_id}`, 'ok');
      } catch (err) {
        setStatus(`Instagram error: ${err.message}`, 'error');
        igPostBtn.disabled = false;
      }
    });

    // ── Share to Instagram ────────────────────────────────────────────────────

    shareBtn.addEventListener('click', async () => {
      if (!capturedBlob) return;
      if (!navigator.canShare) {
        setStatus('Web Share not supported on this browser/device.', 'error');
        return;
      }
      const file = new File([capturedBlob], `capture_${Date.now()}.jpg`, { type: 'image/jpeg' });
      if (!navigator.canShare({ files: [file] })) {
        setStatus('This browser cannot share files.', 'error');
        return;
      }
      try {
        await navigator.share({
          files: [file],
          title: messageEl.value || 'Photo Capture'
        });
      } catch (err) {
        if (err.name !== 'AbortError') setStatus(`Share error: ${err.message}`, 'error');
      }
    });

    // ── Helpers ───────────────────────────────────────────────────────────────

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className   = type;
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    startCamera();    connectMQTT();  </script>
</body>
</html>
