<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Camera Stream</title>
  <meta name="theme-color" content="#0d0d0d" />
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #0d0d0d;
      color: #e8e8e8;
    }
  </style>
  <link rel="stylesheet" href="/css/camera.css" />
</head>
<body>

  <div id="ssl-banner">
    ⚠ If you see a "not secure" warning, tap <strong>Advanced → Proceed</strong>
    to allow camera access over this local connection.
  </div>

  <div id="preview-wrap">
    <video id="preview" autoplay playsinline muted></video>
    <canvas id="overlay-canvas"></canvas>
    <canvas id="send-canvas"></canvas>

    <div id="overlay">
      <h2 id="overlay-title">Loading model…</h2>
      <p id="overlay-sub">Downloading YOLO ONNX model for on-device inference.</p>
    </div>
  </div>

  <div id="status-bar">
    <div id="status-dot" class="connecting"></div>
    <span id="status-label">Initializing…</span>
    <span id="fps-label"></span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    // ── Config ────────────────────────────────────────────────────
    const MODEL_SIZE    = 640;
    const CONF_THRESH   = 0.35;
    const IOU_THRESH    = 0.45;
    const SEND_EVERY_MS = 100;   // max 10 fps to server

    // ── State ─────────────────────────────────────────────────────
    let ortSession  = null;
    let inputName   = 'images';
    let outputName  = 'output0';
    let classNames  = [];
    let streaming   = false;
    let inferencing = false;
    let lastSendTs  = 0;
    let sendLock    = false;
    let framesSent  = 0;

    // ── Elements ──────────────────────────────────────────────────
    const video         = document.getElementById('preview');
    const overlayCanvas = document.getElementById('overlay-canvas');
    const sendCanvas    = document.getElementById('send-canvas');
    const overlayCtx    = overlayCanvas.getContext('2d');
    const overlayEl     = document.getElementById('overlay');
    const overlayTitle  = document.getElementById('overlay-title');
    const overlaySub    = document.getElementById('overlay-sub');
    const dot           = document.getElementById('status-dot');
    const statusLabel   = document.getElementById('status-label');
    const fpsLabel      = document.getElementById('fps-label');
    const sslBanner     = document.getElementById('ssl-banner');

    // ── Socket.IO ─────────────────────────────────────────────────
    const socket = io({ transports: ['websocket'] });
    socket.on('disconnect', () => { if (streaming) setStatus('error', 'Socket disconnected…'); });

    // ── Helpers ───────────────────────────────────────────────────
    function setStatus(cls, text) {
      dot.className = cls;
      statusLabel.textContent = text;
    }

    // ── Model loading ─────────────────────────────────────────────
    async function loadModel() {
      setStatus('connecting', 'Loading YOLO model…');
      try {
        // Point WASM runtime to CDN so we don't need to host the .wasm files
        ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/';
        // Use WASM-only: the WebGL packed backend throws a runtime error
        // ("resize (packed) does not support mode: 'nearest'") for YOLOv8 Resize
        // ops. This error occurs at inference time, not session creation, so a
        // try/catch around create() cannot catch it. WASM fully supports all ops.
        const s = await ort.InferenceSession.create('/model', { executionProviders: ['wasm'] });
        if (!s) throw new Error('Could not create ONNX inference session.');

        ortSession  = s;
        inputName   = ortSession.inputNames[0];
        outputName  = ortSession.outputNames[0];

        const namesRes = await fetch('/model/names');
        classNames = await namesRes.json();

        // Warm up the model with a dummy run so first real frame is fast
        const dummy = new ort.Tensor('float32', new Float32Array(1 * 3 * MODEL_SIZE * MODEL_SIZE), [1, 3, MODEL_SIZE, MODEL_SIZE]);
        const feed = {}; feed[inputName] = dummy;
        await ortSession.run(feed);

        overlayTitle.textContent = 'Starting camera…';
        overlaySub.textContent   = 'Please allow camera access when prompted.';
        setStatus('connecting', 'Model ready — starting camera…');
        await startCamera();
      } catch (err) {
        overlayTitle.textContent = 'Error';
        overlaySub.textContent   = err.message;
        setStatus('error', 'Failed: ' + (err.message || err));
      }
    }

    // ── Camera ────────────────────────────────────────────────────
    async function startCamera() {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error(
            'Camera API unavailable. This page must be opened over HTTPS.\n' +
            'Accept the SSL certificate warning first (tap Advanced → Proceed), then reload.'
          );
        }
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false,
        });
        video.srcObject = stream;
        await new Promise(res => { video.onloadedmetadata = res; });
        overlayEl.classList.add('hidden');
        if (location.protocol === 'https:') sslBanner.style.display = 'none';
        streaming = true;
        setStatus('streaming', 'Running on-device inference…');

        setInterval(() => {
          if (streaming) { fpsLabel.textContent = `${framesSent} fps`; framesSent = 0; }
        }, 1000);

        requestAnimationFrame(inferenceLoop);
      } catch (err) {
        overlayTitle.textContent = 'Camera access denied';
        overlaySub.textContent   = err.message;
        setStatus('error', 'Camera error: ' + err.name);
      }
    }

    // ── Preprocessing: video frame → Float32 NCHW tensor ─────────
    function preprocess() {
      const S   = MODEL_SIZE;
      const vw  = video.videoWidth;
      const vh  = video.videoHeight;
      const sc  = Math.min(S / vw, S / vh);
      const nw  = Math.round(vw * sc);
      const nh  = Math.round(vh * sc);
      const px  = Math.round((S - nw) / 2);
      const py  = Math.round((S - nh) / 2);

      const off = new OffscreenCanvas(S, S);
      const ctx = off.getContext('2d');
      ctx.fillStyle = '#808080';
      ctx.fillRect(0, 0, S, S);
      ctx.drawImage(video, px, py, nw, nh);

      const px4   = ctx.getImageData(0, 0, S, S).data;
      const t     = new Float32Array(3 * S * S);
      const plane = S * S;
      for (let i = 0; i < plane; i++) {
        t[i]           = px4[i * 4]     / 255;
        t[i + plane]   = px4[i * 4 + 1] / 255;
        t[i + 2*plane] = px4[i * 4 + 2] / 255;
      }
      return { tensor: t, scale: sc, padX: px, padY: py };
    }

    // ── Postprocessing: raw output → detection list ───────────────
    function postprocess(output, scale, padX, padY) {
      const [, channels, numBoxes] = output.dims;  // [1, 4+nc, 8400]
      const nc   = channels - 4;
      const data = output.data;
      const vw   = video.videoWidth;
      const vh   = video.videoHeight;
      const dets = [];

      for (let i = 0; i < numBoxes; i++) {
        let maxConf = CONF_THRESH, cls = -1;
        for (let c = 0; c < nc; c++) {
          const conf = data[(4 + c) * numBoxes + i];
          if (conf > maxConf) { maxConf = conf; cls = c; }
        }
        if (cls === -1) continue;

        const cx_m = data[0 * numBoxes + i];
        const cy_m = data[1 * numBoxes + i];
        const w_m  = data[2 * numBoxes + i];
        const h_m  = data[3 * numBoxes + i];

        const cx = (cx_m - padX) / scale;
        const cy = (cy_m - padY) / scale;
        const bw = w_m / scale;
        const bh = h_m / scale;

        dets.push({
          x1: Math.max(0, cx - bw / 2), y1: Math.max(0, cy - bh / 2),
          x2: Math.min(vw, cx + bw / 2), y2: Math.min(vh, cy + bh / 2),
          cx, cy, conf: maxConf, classIdx: cls,
          name: classNames[cls] ?? `cls${cls}`,
        });
      }
      return nms(dets);
    }

    function iou(a, b) {
      const ix1 = Math.max(a.x1, b.x1), iy1 = Math.max(a.y1, b.y1);
      const ix2 = Math.min(a.x2, b.x2), iy2 = Math.min(a.y2, b.y2);
      const inter = Math.max(0, ix2 - ix1) * Math.max(0, iy2 - iy1);
      const ua = (a.x2 - a.x1) * (a.y2 - a.y1);
      const ub = (b.x2 - b.x1) * (b.y2 - b.y1);
      return inter / (ua + ub - inter + 1e-6);
    }

    function nms(dets) {
      dets.sort((a, b) => b.conf - a.conf);
      const out = [], used = new Uint8Array(dets.length);
      for (let i = 0; i < dets.length; i++) {
        if (used[i]) continue;
        out.push(dets[i]);
        for (let j = i + 1; j < dets.length; j++)
          if (!used[j] && iou(dets[i], dets[j]) > IOU_THRESH) used[j] = 1;
      }
      return out;
    }

    // ── Drawing ───────────────────────────────────────────────────
    const AXIS_COLORS = { o: '#ff4444', x: '#44ee44', y: '#4499ff' };

    function drawDetections(dets) {
      const vw = video.videoWidth, vh = video.videoHeight;
      if (overlayCanvas.width !== vw)  overlayCanvas.width  = vw;
      if (overlayCanvas.height !== vh) overlayCanvas.height = vh;
      const ctx = overlayCtx;
      ctx.clearRect(0, 0, vw, vh);

      const centers = {};
      for (const d of dets) {
        const color = AXIS_COLORS[d.name] ?? `hsl(${(d.classIdx * 60) % 360},85%,60%)`;
        const { x1, y1, x2, y2, cx, cy, name, conf } = d;

        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

        const label = `${name} ${Math.round(conf * 100)}%`;
        ctx.font = 'bold 14px monospace';
        const tw = ctx.measureText(label).width + 10;
        ctx.fillStyle = color;   ctx.fillRect(x1, y1 - 22, tw, 22);
        ctx.fillStyle = '#000'; ctx.fillText(label, x1 + 5, y1 - 6);

        ctx.fillStyle = '#ff3333';
        ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2); ctx.fill();
        centers[name] = [cx, cy];
      }

      // Connecting lines
      const pts = Object.values(centers);
      for (let i = 0; i < pts.length; i++)
        for (let j = i + 1; j < pts.length; j++) {
          ctx.strokeStyle = 'rgba(0,255,0,0.75)'; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(pts[i][0], pts[i][1]); ctx.lineTo(pts[j][0], pts[j][1]); ctx.stroke();
        }

      // 2-D axis arrows
      if (centers.o && centers.x) drawArrow(ctx, centers.o, centers.x, '#ff4444', 'X');
      if (centers.o && centers.y) drawArrow(ctx, centers.o, centers.y, '#44ee44', 'Y');

      // Missing markers hint
      const missing = ['o','x','y'].filter(k => !centers[k]);
      if (missing.length > 0 && missing.length < 3) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(8, 8, 260, 32);
        ctx.fillStyle = '#ffaa00'; ctx.font = '14px monospace';
        ctx.fillText(`Missing: [${missing.join(', ')}]`, 14, 28);
      }
    }

    function drawArrow(ctx, from, to, color, label) {
      const [x1, y1] = from, [x2, y2] = to;
      const len = Math.hypot(x2 - x1, y2 - y1);
      if (len < 1) return;
      const ux = (x2 - x1) / len, uy = (y2 - y1) / len;
      const hl = 15, hw = 7;
      ctx.strokeStyle = color; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2 - ux*hl, y2 - uy*hl); ctx.stroke();
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - ux*hl + uy*hw, y2 - uy*hl - ux*hw);
      ctx.lineTo(x2 - ux*hl - uy*hw, y2 - uy*hl + ux*hw);
      ctx.closePath(); ctx.fill();
      ctx.font = 'bold 15px monospace'; ctx.fillStyle = color;
      ctx.fillText(label, x2 + ux * 8 + 3, y2 + uy * 8 + 5);
    }

    // ── Send composite frame to server ────────────────────────────
    function sendComposite() {
      const now = Date.now();
      if (now - lastSendTs < SEND_EVERY_MS || sendLock || !socket.connected) return;
      lastSendTs = now;
      const vw = video.videoWidth, vh = video.videoHeight;
      sendCanvas.width = vw; sendCanvas.height = vh;
      const ctx = sendCanvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      ctx.drawImage(overlayCanvas, 0, 0);
      sendLock = true;
      socket.emit('frame', sendCanvas.toDataURL('image/jpeg', 0.72), () => { sendLock = false; });
      setTimeout(() => { sendLock = false; }, 500);
      framesSent++;
    }

    // ── Inference loop (rAF-based) ────────────────────────────────
    async function inferenceLoop() {
      if (streaming && ortSession && !inferencing && video.readyState >= 2 && video.videoWidth > 0) {
        inferencing = true;
        try {
          const { tensor, scale, padX, padY } = preprocess();
          const feed = {};
          feed[inputName] = new ort.Tensor('float32', tensor, [1, 3, MODEL_SIZE, MODEL_SIZE]);
          const result = await ortSession.run(feed);
          const dets = postprocess(result[outputName], scale, padX, padY);
          drawDetections(dets);
          sendComposite();
        } catch (e) {
          console.error('Inference error:', e);
        } finally {
          inferencing = false;
        }
      }
      requestAnimationFrame(inferenceLoop);
    }

    // ── Boot ──────────────────────────────────────────────────────
    if (location.protocol === 'https:') sslBanner.style.display = 'block';
    loadModel();
  </script>
</body>
</html>
